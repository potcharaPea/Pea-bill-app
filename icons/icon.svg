<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f8a4c"/>
      <stop offset="100%" stop-color="#0d5c30"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef5ee"/>
    </linearGradient>
    <linearGradient id="calc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d5c30"/>
      <stop offset="100%" stop-color="#083e1f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Receipt paper with zig-zag bottom -->
  <g filter="url(#shadow)">
    <path d="M 110 80
             L 330 80
             Q 350 80 350 100
             L 350 380
             L 330 360 L 310 380 L 290 360 L 270 380 L 250 360 L 230 380 L 210 360 L 190 380 L 170 360 L 150 380 L 130 360 L 110 380
             Z" fill="url(#paper)"/>

    <!-- Receipt header band -->
    <rect x="110" y="80" width="240" height="36" rx="0" fill="#1f8a4c"/>
    <text x="230" y="106" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">ใบบริการ</text>

    <!-- Receipt lines -->
    <rect x="130" y="138" width="180" height="6" rx="3" fill="#cfd8d4"/>
    <rect x="130" y="158" width="160" height="6" rx="3" fill="#cfd8d4"/>
    <rect x="130" y="178" width="190" height="6" rx="3" fill="#cfd8d4"/>
    <rect x="130" y="198" width="140" height="6" rx="3" fill="#cfd8d4"/>

    <!-- Total line -->
    <line x1="130" y1="226" x2="330" y2="226" stroke="#1f8a4c" stroke-width="3" stroke-dasharray="5,4"/>
    <text x="130" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d5c30">TOTAL</text>
    <text x="330" y="258" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d5c30" text-anchor="end">฿</text>
  </g>

  <!-- Calculator overlay (bottom-right) -->
  <g filter="url(#shadow)">
    <rect x="280" y="270" width="170" height="190" rx="22" fill="url(#calc)" stroke="#ffffff" stroke-width="4"/>

    <!-- Calculator screen -->
    <rect x="296" y="286" width="138" height="40" rx="6" fill="#a7e9b8"/>
    <text x="426" y="316" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#0d5c30" text-anchor="end">123</text>

    <!-- Calculator buttons (3x3 grid + bottom row) -->
    <g fill="#ffffff">
      <circle cx="312" cy="352" r="13"/>
      <circle cx="354" cy="352" r="13"/>
      <circle cx="396" cy="352" r="13"/>

      <circle cx="312" cy="392" r="13"/>
      <circle cx="354" cy="392" r="13"/>
      <circle cx="396" cy="392" r="13"/>

      <circle cx="312" cy="432" r="13"/>
      <circle cx="354" cy="432" r="13"/>
    </g>
    <!-- Equal sign button (highlight) -->
    <circle cx="418" cy="412" r="22" fill="#ffd34d"/>
    <text x="418" y="421" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#0d5c30" text-anchor="middle">=</text>
  </g>

  <!-- Lightning bolt small badge (top-right) -->
  <g transform="translate(380,90)" filter="url(#shadow)">
    <circle r="42" fill="#ffd34d" stroke="#ffffff" stroke-width="5"/>
    <path d="M -8 -22 L 12 -2 L -2 -2 L 8 22 L -12 0 L 2 0 Z" fill="#0d5c30"/>
  </g>
</svg>
